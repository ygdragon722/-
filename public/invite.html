<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1917" />
    <meta
      name="description"
      content="《红楼幻梦》试玩邀请：一款竖屏互动短篇，现代女性读者入梦成为宝玉，在大观园里读人，也被游戏反过来读。"
    />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&display=swap" rel="stylesheet" />
    <title>红楼幻梦 · 试玩邀请</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #1c1917;
        --panel: rgb(28 25 23 / 0.68);
        --line: rgb(252 211 77 / 0.36);
        --gold: #fde68a;
        --text: #fff7ed;
        --muted: rgb(231 229 228 / 0.78);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Noto Serif SC", "Songti SC", "STSong", serif;
        background: var(--ink);
        color: var(--text);
      }

      .page {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        padding: 28px 18px;
      }

      .page::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          linear-gradient(180deg, rgb(28 25 23 / 0.42), rgb(28 25 23 / 0.14) 38%, rgb(28 25 23 / 0.84)),
          radial-gradient(circle at 50% 28%, rgb(251 191 36 / 0.2), transparent 38%),
          url("./assets/scenes/opening-mirror-back.webp") center / cover;
        filter: brightness(1.08) contrast(1.02) saturate(1.02);
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(100%, 430px);
        min-height: calc(100vh - 56px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
      }

      .brand {
        text-align: center;
        text-shadow: 0 8px 24px rgb(0 0 0 / 0.82);
      }

      .kicker {
        margin: 0 0 12px;
        font-size: 12px;
        letter-spacing: 0.32em;
        color: rgb(253 230 138 / 0.78);
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 14vw, 62px);
        line-height: 1.05;
        letter-spacing: 0.16em;
        text-indent: 0.16em;
      }

      .subtitle {
        margin: 18px auto 0;
        max-width: 18em;
        font-size: 15px;
        line-height: 1.9;
        color: var(--muted);
      }

      .panel {
        border: 1px solid rgb(255 255 255 / 0.14);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 46px rgb(0 0 0 / 0.42);
        backdrop-filter: blur(12px);
      }

      .intro {
        padding: 18px 20px;
        border-left: 2px solid rgb(253 230 138 / 0.62);
      }

      .intro p {
        margin: 0;
        font-size: 14px;
        line-height: 1.9;
        color: rgb(245 245 244 / 0.9);
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      .button {
        display: block;
        width: 100%;
        border: 1px solid rgb(252 211 77 / 0.58);
        border-radius: 8px;
        padding: 16px 20px;
        background: rgb(28 25 23 / 0.62);
        color: var(--gold);
        text-align: center;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.14em;
        box-shadow: 0 12px 34px rgb(0 0 0 / 0.32);
        transition: border-color 180ms ease, background 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .button:hover,
      .button:focus-visible {
        border-color: rgb(253 230 138 / 0.88);
        background: rgb(253 230 138 / 0.12);
        color: #fffbeb;
        outline: none;
      }

      .button:active {
        transform: scale(0.99);
      }

      .button.secondary {
        border-color: rgb(255 255 255 / 0.16);
        color: rgb(231 229 228 / 0.86);
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.08em;
      }

      .qr-panel {
        display: grid;
        grid-template-columns: 112px 1fr;
        gap: 16px;
        align-items: center;
        padding: 14px;
      }

      .qr {
        width: 112px;
        height: 112px;
        border-radius: 6px;
        background: #f8f1dc;
        padding: 8px;
      }

      .qr img {
        display: block;
        width: 100%;
        height: 100%;
      }

      .qr-copy {
        margin: 0;
        font-size: 12px;
        line-height: 1.8;
        color: rgb(231 229 228 / 0.76);
      }

      .link {
        margin-top: 8px;
        word-break: break-all;
        color: rgb(253 230 138 / 0.74);
        font-size: 11px;
        line-height: 1.6;
      }

      .note {
        margin: 0;
        text-align: center;
        font-size: 11px;
        line-height: 1.8;
        color: rgb(168 162 158 / 0.88);
        text-shadow: 0 2px 10px rgb(0 0 0 / 0.7);
      }

      @media (max-width: 380px) {
        .page {
          padding-inline: 14px;
        }

        .qr-panel {
          grid-template-columns: 96px 1fr;
          gap: 12px;
        }

        .qr {
          width: 96px;
          height: 96px;
        }

        .button {
          padding-inline: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="shell" aria-labelledby="title">
        <header class="brand">
          <p class="kicker">竖屏互动短篇试玩</p>
          <h1 id="title">红楼幻梦</h1>
          <p class="subtitle">一场读人，也被人读的梦。</p>
        </header>

        <section class="panel intro" aria-label="试玩说明">
          <p>你是一位独自游览现代大观园的女性读者。风月鉴一转，你醒在贾宝玉的身体里。</p>
          <p>读完这三天，游戏也会反过来读你一次。</p>
        </section>

        <nav class="actions" aria-label="试玩入口">
          <a class="button" href="./">开始试玩</a>
          <a class="button secondary" href="./">已有进度，继续旧梦</a>
        </nav>

        <section class="panel qr-panel" aria-label="扫码试玩">
          <div class="qr">
            <img src="./share/honglou-play-qr.svg" alt="红楼幻梦试玩二维码" />
          </div>
          <div>
            <p class="qr-copy">发给朋友时，可以直接发本页；在电脑上打开时，用手机扫码进入游戏。</p>
            <div class="link">https://ygdragon722.github.io/-/</div>
          </div>
        </section>

        <p class="note">建议手机竖屏打开。单人网页试玩，进度只保存在各自浏览器里。</p>
      </section>
    </main>
  </body>
</html>
